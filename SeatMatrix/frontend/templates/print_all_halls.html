<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>All Halls — Seating Arrangement</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 11px; background: white; color: #000; }
  .page { padding: 10mm 12mm; max-width: 297mm; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #C62828; padding-bottom: 10px; margin-bottom: 10px; gap: 16px; }
  .header-left { display: flex; align-items: center; gap: 14px; flex: 1; }
  .header-logo { height: 56px; width: auto; object-fit: contain; flex-shrink: 0; filter: brightness(0) saturate(100%) invert(18%) sepia(96%) saturate(2472%) hue-rotate(349deg) brightness(85%) contrast(112%); }
  .college-name { font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.8px; color: #C62828; }
  .college-sub { font-size: 9px; color: #555; margin-top: 2px; }
  .header-right { text-align: right; }
  .exam-title-label { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; color: #1a1a2e; }
  .exam-name-label { font-size: 9px; color: #777; margin-top: 2px; }
  .info-bar { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; background: #fff5f5; border: 1px solid #FFCDD2; border-radius: 4px; padding: 8px 14px; margin-bottom: 8px; }
  .info-item { text-align: center; min-width: 70px; }
  .info-label { font-size: 7.5px; color: #999; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
  .info-value { font-size: 11px; font-weight: bold; margin-top: 1px; color: #1a1a2e; }
  .legend { display: flex; gap: 14px; font-size: 9px; align-items: center; margin-bottom: 7px; flex-wrap: wrap; }
  .legend strong { font-size: 9px; color: #444; }
  .lb { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 3px; vertical-align: middle; border: 1px solid; }
  .summary { margin-bottom: 8px; }
  .summary h4 { font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #333; }
  .summary table { border-collapse: collapse; font-size: 9.5px; }
  .summary td, .summary th { border: 1px solid #ddd; padding: 3px 12px; }
  .summary th { background: #f5f5f5; font-weight: 600; color: #444; }
  .grid-label { font-size: 9px; color: #888; text-align: center; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .grid-wrap { overflow-x: auto; margin-bottom: 10px; }
  table.seat-grid { border-collapse: collapse; table-layout: fixed; }
  table.seat-grid td { border: 1px solid #ddd; text-align: center; vertical-align: middle; height: 64px; width: 76px; padding: 3px; font-size: 9px; }
  td.seat-a { background: #FFF8F8; border-color: #FFCDD2; }
  td.seat-b { background: #F3F8FF; border-color: #BBDEFB; }
  td.seat-c { background: #F3FFF5; border-color: #C8E6C9; }
  td.blocked { background: #F5F5F5; color: #bbb; font-size: 14px; }
  td.empty { background: #FAFAFA; }
  td.aisle { background: transparent; border: none; width: 14px !important; padding: 0; }
  .s-num { font-size: 14px; font-weight: bold; color: #C62828; line-height: 1; }
  td.seat-b .s-num { color: #1565C0; }
  td.seat-c .s-num { color: #2E7D32; }
  .s-reg { font-size: 8.5px; font-weight: 600; margin: 2px 0 1px; }
  .s-dept { font-size: 7px; color: #666; }
  .s-subj { font-size: 7.5px; font-weight: 600; color: #333; margin-top: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 70px; margin-left: auto; margin-right: auto; }
  .s-set { font-size: 7.5px; font-weight: bold; margin-top: 1px; }
  td.seat-a .s-set { color: #C62828; } td.seat-b .s-set { color: #1565C0; } td.seat-c .s-set { color: #2E7D32; }
  .door-slip { border: 2px dashed #C62828; border-radius: 5px; padding: 8px 14px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
  .door-cut { font-size: 8.5px; color: #999; margin-bottom: 2px; }
  .door-title { font-size: 14px; font-weight: bold; color: #C62828; }
  .door-info { font-size: 10px; color: #444; margin-top: 2px; }
  .door-icon { width: 40px; height: 40px; background: #fff5f5; border: 1.5px solid #FFCDD2; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #C62828; flex-shrink: 0; }
  .signatures { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 10px; border-top: 1px solid #ddd; }
  .sig-box { text-align: center; }
  .sig-line { border-bottom: 1px solid #333; width: 150px; margin: 0 auto 4px; height: 24px; }
  .sig-label { font-size: 8.5px; color: #666; }
  .footer { text-align: center; font-size: 7.5px; color: #bbb; margin-top: 10px; }
  .print-btn { position: fixed; top: 14px; right: 14px; background: #C62828; color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; font-family: Arial; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 9999; }
  .print-btn:hover { background: #B71C1C; }

  /* Page break rules for all halls printing */
  .hall-page { page-break-after: always; }
  .hall-page:last-child { page-break-after: avoid; }
  .hall-page .print-btn { display: none !important; }

  @media print {
    .print-btn { display: none !important; }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 6mm 8mm; }
    td.seat-a { background: #FFF8F8 !important; border-color: #FFCDD2 !important; }
    td.seat-b { background: #F3F8FF !important; border-color: #BBDEFB !important; }
    td.seat-c { background: #F3FFF5 !important; border-color: #C8E6C9 !important; }
  }
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">Print All Halls</button>
{% for page in pages %}
<div class="hall-page">{{ page | safe }}</div>
{% endfor %}
</body>
</html>
